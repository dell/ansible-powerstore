name: "PowerStore Bug Report"
description: "File a bug report for Dell PowerStore Ansible Modules"
title: "[BUG]: "
labels: ["type/bug", "needs-triage", "ansible"]
body:
  - type: input
    id: title
    attributes:
      label: Title
      description: "[BUG]: prefix is required and cannot be removed"
      value: "[BUG]: "
    validations:
      required: true

  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug in Dell PowerStore Ansible Modules! Please provide the information below.
        
        ## Community Note
        * Please vote on this issue by adding a reaction to help prioritize this request
        * Please do not leave "+1" or other comments that do not add relevant new information or questions
        * If you are interested in working on this issue or have submitted a pull request, please leave a comment

  - type: textarea
    id: bug-description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is
    validations:
      required: true

  - type: input
    id: module-name
    attributes:
      label: Module Name
      description: Enter the specific PowerStore module name (e.g., dellemc_powerstore_volume, dellemc_powerstore_storagepool, dellemc_powerstore_nfs)
      placeholder: "dellemc_powerstore_volume"
    validations:
      required: true

  - type: textarea
    id: ansible-environment
    attributes:
      label: Ansible Environment
      description: |
        Please provide your Ansible environment details:
        - Ansible Version: [e.g. 2.12, 2.13]
        - Python Version: [e.g. 3.9, 3.10]
        - Ansible Controller Version (if applicable): [e.g. Tower 3.8, AWX 19]
        - Collection Version: [e.g. 1.2.0, 1.1.0]
      placeholder: |
        Ansible: 2.12.5
        Python: 3.9.10
        Controller: AWX 19.0.0
        Collection: dellemc.powerstore 1.2.0
    validations:
      required: true

  - type: textarea
    id: target-environment
    attributes:
      label: Target Environment
      description: |
        Please provide details about the target environment:
        - Operating System: [e.g. RHEL 8.5, Ubuntu 20.04, Windows Server 2019]
        - PowerStore Version: [e.g. 4.0, 3.6, 3.5]
        - Network Configuration: [e.g. VPN, direct connection, proxy]
        - Authentication Method: [e.g. username/password, API key, certificate]
      placeholder: |
        OS: RHEL 8.5
        PowerStore: 4.0
        Network: Direct connection
        Auth: Username/password
    validations:
      required: true

  - type: textarea
    id: playbook-content
    attributes:
      label: Playbook/Task Content
      description: |
        Include the complete playbook or task that reproduces the issue.
        Please be sure to remove all sensitive data such as IP addresses, host names, credentials, etc.
        
        Example:
        ```yaml
        ---
        - hosts: localhost
          collections:
            - dellemc.powerstore
          tasks:
            - name: Create PowerStore volume
              dellemc.powerstore.volume:
                name: "test_volume"
                size: 100
                size_unit: "GB"
                storage_pool: "default_pool"
                api_host: "{{ powerstore_host }}"
                api_user: "{{ powerstore_user }}"
                api_password: "{{ powerstore_password }}"
                validate_certs: false
        ```
      render: markdown
    validations:
      required: true

  - type: textarea
    id: execution-steps
    attributes:
      label: Execution Steps
      description: |
        Provide the exact commands used to run the playbook and the complete output.
        
        Example:
        ```bash
        ansible-playbook -i inventory site.yml -vvv
        ```
    validations:
      required: true

  - type: textarea
    id: expected-behavior
    attributes:
      label: Expected Behavior
      description: A clear and concise description of what you expected to happen
    validations:
      required: true

  - type: textarea
    id: actual-behavior
    attributes:
      label: Actual Behavior
      description: A clear and concise description of what actually happened
    validations:
      required: true

  - type: textarea
    id: error-output
    attributes:
      label: Complete Error Output
      description: Copy/paste the complete error message including traceback. Remove sensitive data.
    validations:
      required: false

  - type: textarea
    id: troubleshooting
    attributes:
      label: Troubleshooting Steps Taken
      description: What have you tried so far to resolve this issue?
    validations:
      required: false

  - type: textarea
    id: additional-context
    attributes:
      label: Additional Context
      description: Any other context about the problem, such as related documentation, similar issues, etc.
    validations:
      required: false